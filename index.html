<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SyncDrive Pro v1.2.1 - Tri & Intégralité</title>
    <style>
        :root { --primary: #2c3e50; --error: #c0392b; --success: #27ae60; --warning: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; margin: 20px; background: #f4f7f6; color: var(--primary); }
        #setup, #controls { background: white; padding: 15px; border-radius: 4px; margin-bottom: 15px; border: 1px solid #bdc3c7; }
        .panes-container { display: flex; gap: 20px; }
        .pane { flex: 1; background: white; border: 1px solid #bdc3c7; border-radius: 4px; }
        .pane-header { background: var(--primary); color: white; padding: 10px; font-weight: bold; text-align: center; }
        .pane-content { height: 350px; overflow-y: auto; padding: 10px; font-family: monospace; font-size: 12px; }
        .log-container { background: #000; color: #0f0; padding: 10px; height: 120px; overflow-y: scroll; font-size: 11px; margin-top: 20px; }
        button { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 5px; margin-top: 5px; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: var(--success); color: white; }
        .btn-orange { background: var(--warning); color: white; }
        #btnPicker:disabled { background: #bdc3c7; cursor: not-allowed; }
        
        #customPicker { display: none; margin-top: 15px; padding: 15px; background: #e8f4f8; border: 1px solid #3498db; border-radius: 4px; }
        select { padding: 8px; width: 100%; max-width: 400px; margin-top: 5px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #bdc3c7; }
    </style>
</head>
<body>

    <h2>📦 SyncDrive Pro <small>v1.2.1</small></h2>
    
    <div id="setup">
        <strong>1. Connexion & Sélection :</strong><br>
        <button class="btn-blue" onclick="handleAuthClick()">🔑 1. Connexion Google</button>
        <button id="btnPicker" class="btn-blue" onclick="loadDriveFolders()" disabled>📁 2. Lister mes dossiers</button>
        <button class="btn-blue" onclick="initLocalScan()">💾 3. Choisir Dossier Local</button>
        <span id="targetInfo" style="margin-left:10px; color:var(--success); font-weight:bold;"></span>

        <div id="customPicker">
            <strong>Choisissez un dossier Drive :</strong><br>
            <select id="driveFolderSelect"></select><br>
            <button class="btn-green" onclick="confirmFolderSelection()">✅ Valider ce dossier</button>
        </div>
    </div>

    <div id="controls">
        <strong>2. Analyse :</strong><br>
        <button class="btn-orange" onclick="runSimulation()">📋 Lancer la Simulation</button>
        <span id="diffStats" style="margin-left:15px; font-style: italic;"></span>
    </div>

    <div class="panes-container">
        <div class="pane">
            <div class="pane-header">☁️ CLOUD</div>
            <div id="pane-drive" class="pane-content">En attente...</div>
        </div>
        <div class="pane">
            <div class="pane-header">💾 LOCAL</div>
            <div id="pane-local" class="pane-content">En attente...</div>
        </div>
    </div>

    <div class="log-container" id="logs"></div>

    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

    <script>
        // --- CONFIGURATION INTÉGRÉE ---
        const CLIENT_ID = '944621175150-srl9ukm3ntq8rtg8629cm1fdo60tpe3v.apps.googleusercontent.com'; 
        const API_KEY = 'AIzaSyAN0QLhBIRQ_xxbU8tv0kix85DA3lY9nU4'; 
        const SCOPES = 'https://www.googleapis.com/auth/drive.readonly';
        
        let targetFolderId = null;
        let driveFiles = [];
        let localFiles = [];
        let tokenClient;
        let accessToken = null;

        function log(msg, type='INFO') {
            const l = document.getElementById('logs');
            l.innerHTML += `[${type}] ${msg}<br>`;
            l.scrollTop = l.scrollHeight;
        }

        // --- MOTEUR V1.2.1 : TRI ALPHABÉTIQUE ET PAGINATION COMPLÈTE ---
        async function loadDriveFolders() {
            log("Interrogation de votre Drive (recherche de tous les dossiers)...", "PROCESS");
            try {
                let allFolders = [];
                let pageToken = null;

                // Boucle pour récupérer TOUS les dossiers (Google renvoie par lots)
                do {
                    const res = await gapi.client.drive.files.list({
                        q: "mimeType='application/vnd.google-apps.folder' and trashed=false",
                        fields: 'nextPageToken, files(id, name)',
                        pageSize: 1000, 
                        orderBy: 'name', // Tri alphabétique demandé à Google
                        pageToken: pageToken
                    });
                    
                    if (res.result.files) {
                        allFolders = allFolders.concat(res.result.files);
                    }
                    pageToken = res.result.nextPageToken;
                } while (pageToken); 

                if (!allFolders || allFolders.length === 0) {
                    log("Aucun dossier trouvé sur votre Drive.", "WARNING");
                    return;
                }

                // Remplissage de la liste déroulante
                const select = document.getElementById('driveFolderSelect');
                select.innerHTML = allFolders.map(f => `<option value="${f.id}">📁 ${f.name}</option>`).join('');
                
                document.getElementById('customPicker').style.display = 'block';
                log(`${allFolders.length} dossiers récupérés et triés avec succès.`, "SUCCESS");

            } catch (err) {
                log("Erreur de récupération : " + err.message, "ERROR");
            }
        }

        async function confirmFolderSelection() {
            const select = document.getElementById('driveFolderSelect');
            targetFolderId = select.value;
            const folderName = select.options[select.selectedIndex].text;
            
            document.getElementById('customPicker').style.display = 'none';
            document.getElementById('targetInfo').innerText = `🎯 Cible : ${folderName.replace('📁 ', '')}`;
            log(`Dossier ciblé : ${folderName.replace('📁 ', '')}`, "SUCCESS");
            
            await scanDriveFolder();
        }

        // --- SCAN DES FICHIERS (SURFACE UNIQUEMENT POUR L'INSTANT) ---
        async function scanDriveFolder() {
            log("Scan des fichiers du dossier en cours...", "PROCESS");
            driveFiles = [];
            try {
                const res = await gapi.client.drive.files.list({
                    q: `'${targetFolderId}' in parents and trashed = false`,
                    fields: 'files(id, name, size, mimeType)'
                });
                res.result.files.forEach(f => {
                    if(f.mimeType !== 'application/vnd.google-apps.folder') {
                        driveFiles.push({ name: f.name, size: parseInt(f.size) || 0 });
                    }
                });
                renderPane('pane-drive', driveFiles);
                log(`${driveFiles.length} fichiers trouvés dans le cloud.`, "SUCCESS");
            } catch (err) { log("Erreur Scan: " + err.message, "ERROR"); }
        }

        async function initLocalScan() {
            try {
                const handle = await window.showDirectoryPicker();
                localFiles = [];
                for await (const entry of handle.values()) {
                    if (entry.kind === 'file') {
                        const file = await entry.getFile();
                        localFiles.push({ name: entry.name, size: file.size });
                    }
                }
                renderPane('pane-local', localFiles);
                log(`${localFiles.length} fichiers locaux trouvés.`, "SUCCESS");
            } catch (err) { log("Erreur Local: " + err.message, "ERROR"); }
        }

        function renderPane(id, files) {
            const container = document.getElementById(id);
            container.innerHTML = files.map(f => `<div style="border-bottom:1px solid #eee;">📄 ${f.name}</div>`).join('');
        }

        function gapiLoaded() {
            gapi.load('client', async () => {
                await gapi.client.init({
                    apiKey: API_KEY,
                    discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'],
                });
                log("Moteur Google prêt.", "SYSTEM");
            });
        }

        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (res) => {
                    if (res.error) {
                        log("Erreur Auth: " + res.error, "ERROR");
                        return;
                    }
                    accessToken = res.access_token;
                    document.getElementById('btnPicker').disabled = false;
                    log("Connexion OK.", "SUCCESS");
                }
            });
        }

        function handleAuthClick() { tokenClient.requestAccessToken(); }

        function runSimulation() {
            const toDownload = driveFiles.filter(df => !localFiles.find(lf => lf.name === df.name));
            document.getElementById('diffStats').innerText = `${toDownload.length} manquants localement.`;
            log(`Simulation terminée : ${toDownload.length} fichiers à synchroniser.`, "WARNING");
        }
    </script>
</body>
</html>
