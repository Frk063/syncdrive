<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SyncDrive Pro v1.5.0 - Simulation Mono-directionnelle</title>
    <style>
        :root { --primary: #2c3e50; --error: #c0392b; --success: #27ae60; --warning: #f39c12; --info: #2980b9; --purple: #8e44ad; }
        body { font-family: 'Segoe UI', sans-serif; margin: 20px; background: #f4f7f6; color: var(--primary); }
        #setup, #controls { background: white; padding: 15px; border-radius: 4px; margin-bottom: 15px; border: 1px solid #bdc3c7; }
        .panes-container { display: flex; gap: 20px; }
        .pane { flex: 1; background: white; border: 1px solid #bdc3c7; border-radius: 4px; }
        .pane-header { background: var(--primary); color: white; padding: 10px; font-weight: bold; text-align: center; }
        .pane-content { height: 350px; overflow-y: auto; padding: 10px; font-family: monospace; font-size: 12px; }
        .log-container { background: #000; color: #0f0; padding: 10px; height: 150px; overflow-y: scroll; font-size: 11px; margin-top: 20px; line-height: 1.4; }
        button { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 5px; margin-top: 5px; transition: background 0.3s; }
        button:hover { filter: brightness(1.1); }
        .btn-blue { background: var(--info); color: white; }
        .btn-green { background: var(--success); color: white; }
        .btn-orange { background: var(--warning); color: white; }
        #btnPicker:disabled, #btnSimul:disabled { background: #bdc3c7; cursor: not-allowed; }
        
        #customPicker { display: none; margin-top: 15px; padding: 15px; background: #e8f4f8; border: 1px solid var(--info); border-radius: 4px; }
        select { padding: 8px; width: 100%; max-width: 400px; margin-top: 5px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #bdc3c7; }
        .path-text { color: #7f8c8d; font-size: 0.9em; margin-left: 5px; }
        
        /* Badges pour la simulation */
        .badge { padding: 2px 6px; border-radius: 3px; font-weight: bold; font-size: 10px; margin-right: 5px; color: white; }
        .badge-new { background: var(--purple); }
        .badge-update { background: var(--info); }
        .badge-orphan { background: var(--warning); }
        .badge-ok { background: var(--success); }
    </style>
</head>
<body>

    <h2>📦 SyncDrive Pro <small>v1.5.0</small></h2>
    
    <div id="setup">
        <strong>1. Connexion & Sélection :</strong><br>
        <button class="btn-blue" onclick="handleAuthClick()">🔑 1. Connexion Google</button>
        <button id="btnPicker" class="btn-blue" onclick="loadDriveFolders()" disabled>📁 2. Lister mes dossiers</button>
        <button class="btn-blue" onclick="initLocalScan()">💾 3. Choisir Dossier Local</button>
        <span id="targetInfo" style="margin-left:10px; color:var(--success); font-weight:bold;"></span>

        <div id="customPicker">
            <strong>Choisissez un dossier Drive racine à explorer :</strong><br>
            <select id="driveFolderSelect"></select><br>
            <button class="btn-green" onclick="confirmFolderSelection()">✅ Lancer l'exploration récursive</button>
        </div>
    </div>

    <div id="controls">
        <strong>2. Analyse :</strong><br>
        <button id="btnSimul" class="btn-orange" onclick="runSimulation()" disabled>📋 Lancer la Simulation (Différentiel)</button>
        <span id="diffStats" style="margin-left:15px; font-weight: bold;"></span>
    </div>

    <div class="panes-container">
        <div class="pane">
            <div class="pane-header">☁️ CLOUD (Arborescence complète)</div>
            <div id="pane-drive" class="pane-content">En attente d'exploration...</div>
        </div>
        <div class="pane">
            <div class="pane-header">💾 LOCAL (Arborescence complète)</div>
            <div id="pane-local" class="pane-content">En attente d'exploration...</div>
        </div>
    </div>

    <div class="log-container" id="logs"></div>

    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

    <script>
        // ============================================================================
        // --- CONFIGURATION SÉCURISÉE ---
        // ============================================================================
        const API_PART_1 = 'AIzaSy'; 
        const API_PART_2 = 'DhTQ0I_uqEgHQUA1TnAZRQwBYF-gUfxxc'; 
        const API_KEY = API_PART_1 + API_PART_2;

        const CLIENT_PART_1 = '944621175150-1b9r7m8gb3vvn597ot92c4lhqb9ud9b2'; 
        const CLIENT_PART_2 = '.apps.googleusercontent.com'; 
        const CLIENT_ID = CLIENT_PART_1 + CLIENT_PART_2;
        const SCOPES = 'https://www.googleapis.com/auth/drive.readonly';
        // ============================================================================

        let targetFolderId = null;
        let driveFiles = []; 
        let localFiles = [];
        let tokenClient;
        let accessToken = null;

        function log(msg, type='INFO') {
            const l = document.getElementById('logs');
            const time = new Date().toLocaleTimeString();
            let color = '#0f0'; 
            if (type === 'ERROR') color = '#e74c3c';
            if (type === 'WARNING') color = '#f39c12';
            if (type === 'PROCESS') color = '#3498db';
            if (type === 'SIMUL') color = '#8e44ad';
            
            l.innerHTML += `<span style="color:#888;">[${time}]</span> <span style="color:${color};">[${type}]</span> ${msg}<br>`;
            l.scrollTop = l.scrollHeight;
        }

        function translateError(err) {
            if (err.status === 403 || err.status === 429) return "Surcharge API. Laissez le script respirer.";
            if (err.status === 401) return "Clé invalide ou session expirée.";
            if (err.status === 404) return "Dossier introuvable.";
            return "Erreur inattendue : " + (err.message || err.result?.error?.message || "Erreur réseau.");
        }

        function checkSimulationReady() {
            if (driveFiles.length > 0 && localFiles.length > 0) {
                document.getElementById('btnSimul').disabled = false;
            }
        }

        function renderPaneSafe(id, filesArray) {
            const container = document.getElementById(id);
            container.innerHTML = ''; 

            if (filesArray.length === 0) {
                container.innerHTML = "<em>Aucun fichier trouvé.</em>";
                return;
            }

            const fragment = document.createDocumentFragment();
            filesArray.forEach(f => {
                const div = document.createElement('div');
                div.style.borderBottom = '1px solid #eee';
                div.style.padding = '2px 0';
                
                const iconText = document.createTextNode('📄 ' + f.name + ' ');
                const span = document.createElement('span');
                span.className = 'path-text';
                span.textContent = '(/'+ f.fullPath +')';

                div.appendChild(iconText);
                div.appendChild(span);
                fragment.appendChild(div);
            });
            container.appendChild(fragment);
        }

        // ============================================================================
        // --- MOTEUR 1 : CLOUD (Google Drive) ---
        // ============================================================================
        async function loadDriveFolders() {
            log("Interrogation du Drive...", "PROCESS");
            try {
                let allFolders = [];
                let pageToken = null;
                do {
                    const res = await gapi.client.drive.files.list({
                        q: "mimeType='application/vnd.google-apps.folder' and trashed=false",
                        fields: 'nextPageToken, files(id, name)',
                        pageSize: 1000, orderBy: 'name', pageToken: pageToken
                    });
                    if (res.result.files) allFolders = allFolders.concat(res.result.files);
                    pageToken = res.result.nextPageToken;
                } while (pageToken); 

                const select = document.getElementById('driveFolderSelect');
                select.innerHTML = allFolders.map(f => `<option value="${f.id}">📁 ${f.name}</option>`).join('');
                document.getElementById('customPicker').style.display = 'block';
                log(`${allFolders.length} dossiers racines trouvés.`, "SUCCESS");
            } catch (err) { log(translateError(err), "ERROR"); }
        }

        async function confirmFolderSelection() {
            const select = document.getElementById('driveFolderSelect');
            targetFolderId = select.value;
            const folderName = select.options[select.selectedIndex].text.replace('📁 ', '');
            document.getElementById('customPicker').style.display = 'none';
            document.getElementById('targetInfo').innerText += ` | ☁️ Cible : ${folderName}`;
            driveFiles = [];
            document.getElementById('pane-drive').innerHTML = "<em>Exploration en cours...</em>";
            
            await scanDriveRecursive(targetFolderId, "");
            renderPaneSafe('pane-drive', driveFiles);
            log(`Exploration Cloud terminée ! ${driveFiles.length} fichiers trouvés.`, "SUCCESS");
            checkSimulationReady();
        }

        async function scanDriveRecursive(folderId, currentPath) {
            let pageToken = null;
            try {
                do {
                    const res = await gapi.client.drive.files.list({
                        q: `'${folderId}' in parents and trashed = false`,
                        // AJOUT DE modifiedTime POUR LE COMPARATEUR
                        fields: 'nextPageToken, files(id, name, size, mimeType, modifiedTime)',
                        pageSize: 1000, pageToken: pageToken
                    });

                    const items = res.result.files || [];
                    const files = items.filter(i => i.mimeType !== 'application/vnd.google-apps.folder');
                    files.forEach(f => {
                        const fullPath = currentPath === "" ? f.name : `${currentPath}/${f.name}`;
                        driveFiles.push({ 
                            id: f.id, 
                            name: f.name, 
                            fullPath: fullPath, 
                            size: parseInt(f.size) || 0,
                            modifiedTime: new Date(f.modifiedTime).getTime() // Conversion en Millisecondes
                        });
                    });

                    const subFolders = items.filter(i => i.mimeType === 'application/vnd.google-apps.folder');
                    for (const folder of subFolders) {
                        const nextPath = currentPath === "" ? folder.name : `${currentPath}/${folder.name}`;
                        await scanDriveRecursive(folder.id, nextPath); 
                    }
                    pageToken = res.result.nextPageToken;
                } while (pageToken);
            } catch (err) { log(`Erreur Cloud (/${currentPath}): ${translateError(err)}`, "ERROR"); }
        }

        // ============================================================================
        // --- MOTEUR 2 : DISQUE LOCAL ---
        // ============================================================================
        async function initLocalScan() {
            try {
                const directoryHandle = await window.showDirectoryPicker({ mode: 'read' });
                document.getElementById('pane-local').innerHTML = "<em>Exploration locale en cours...</em>";
                document.getElementById('targetInfo').innerText += ` | 💾 Cible : ${directoryHandle.name}`;
                localFiles = [];
                
                await scanLocalRecursive(directoryHandle, "");
                renderPaneSafe('pane-local', localFiles);
                log(`Exploration locale terminée ! ${localFiles.length} fichiers trouvés.`, "SUCCESS");
                checkSimulationReady();
            } catch (err) {
                if (err.name !== 'AbortError') log(`Erreur d'accès local : ${err.message}`, "ERROR");
            }
        }

        async function scanLocalRecursive(dirHandle, currentPath) {
            try {
                for await (const entry of dirHandle.values()) {
                    const fullPath = currentPath === "" ? entry.name : `${currentPath}/${entry.name}`;
                    if (entry.kind === 'file') {
                        const fileData = await entry.getFile();
                        localFiles.push({
                            name: entry.name,
                            fullPath: fullPath,
                            size: fileData.size,
                            lastModified: fileData.lastModified // Déjà en Millisecondes
                        });
                    } else if (entry.kind === 'directory') {
                        await scanLocalRecursive(entry, fullPath);
                    }
                }
            } catch (err) { log(`Accès refusé par l'OS pour /${currentPath}`, "ERROR"); }
        }

        // ============================================================================
        // --- MOTEUR 3 : LE CERVEAU DIFFÉRENTIEL (Mono-directionnel Cloud -> Local) ---
        // ============================================================================
        function runSimulation() {
            log("--- DÉBUT DE LA SIMULATION MONO-DIRECTIONNELLE ---", "SIMUL");
            
            let toDownload = [];
            let toUpdate = [];
            let identical = [];
            let orphans = []; // Fichiers locaux inconnus du Cloud (ex: les "(1)")

            // 1. On parcourt le Cloud (La source de vérité)
            driveFiles.forEach(cloudFile => {
                // On cherche l'équivalent local via le chemin strict
                const localFile = localFiles.find(lf => lf.fullPath === cloudFile.fullPath);

                if (!localFile) {
                    toDownload.push(cloudFile); // N'existe pas en local
                } else {
                    // Comparaison : Le fichier Cloud est-il plus récent ? (Marge de 2 secondes pour tolérance système de fichiers)
                    if (cloudFile.modifiedTime > (localFile.lastModified + 2000)) {
                        toUpdate.push(cloudFile);
                    } else {
                        identical.push(cloudFile);
                    }
                }
            });

            // 2. On cherche les "Orphelins" locaux (Les fichiers qui n'existent pas sur le Cloud)
            localFiles.forEach(localFile => {
                const cloudFile = driveFiles.find(df => df.fullPath === localFile.fullPath);
                if (!cloudFile) orphans.push(localFile);
            });

            // 3. Affichage du Rapport UI
            document.getElementById('diffStats').innerHTML = 
                `<span style="color:var(--purple)">⬇️ ${toDownload.length} à télécharger</span> | 
                 <span style="color:var(--info)">🔄 ${toUpdate.length} à mettre à jour</span> | 
                 <span style="color:var(--warning)">⚠️ ${orphans.length} orphelins locaux</span> | 
                 <span style="color:var(--success)">✅ ${identical.length} identiques</span>`;

            // Logs détaillés
            if (toDownload.length > 0) log(`${toDownload.length} fichier(s) manquent en local et doivent être téléchargés.`, "SIMUL");
            if (toUpdate.length > 0) log(`${toUpdate.length} fichier(s) locaux sont obsolètes et doivent être écrasés par la version Cloud.`, "SIMUL");
            if (orphans.length > 0) log(`Attention: ${orphans.length} fichier(s) existent sur votre PC mais pas sur le Cloud (Potentiels doublons). Le script n'y touchera pas.`, "WARNING");

            log("--- FIN DE LA SIMULATION ---", "SIMUL");
        }

        // --- AUTHENTIFICATION ---
        function gapiLoaded() {
            gapi.load('client', async () => {
                await gapi.client.init({ apiKey: API_KEY, discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
                log("Moteur Google API initialisé avec succès.", "SYSTEM");
            });
        }
        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID, scope: SCOPES,
                callback: (res) => {
                    if (res.error) { log("Refus d'accès : " + res.error, "ERROR"); return; }
                    accessToken = res.access_token;
                    document.getElementById('btnPicker').disabled = false;
                    log("Connexion sécurisée établie.", "SUCCESS");
                }
            });
        }
        function handleAuthClick() { tokenClient.requestAccessToken(); }
    </script>
</body>
</html>
